paths:
  /api/v1/auth/login:
    post:
      summary: Login user
      tags:
        - Auth

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"

      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"

        400:
          description: Invalid request

        401:
          description: Invalid email or password
